<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CV | Lucas Tournay</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        .cv-display-container {
            margin-top: 30px;
            background: var(--card-bg);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 20px;
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: center;
        }

        .cv-img {
            max-width: 100%;
            height: auto;
            border-radius: 10px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.6);
        }

        .action-bar {
            margin-bottom: 20px;
            display: flex;
            gap: 15px;
        }
    </style>
</head>

<body>

    <canvas id="network-bg"></canvas>

    <nav class="navbar">
        <div class="nav-container">
            <h2 class="logo">Lucas<span>Tournay</span></h2>
            <ul class="nav-links">
                <li><a href="index.html" class="nav-item">Retour Accueil</a></li>
            </ul>
        </div>
    </nav>

    <main>
        <section class="section">
            <h2 class="section-title">Mon Curriculum Vitae</h2>
            <div class="cv-display-container">
                <img src="./docs/CV Alternance bts sio.jpg" alt="CV Lucas Tournay" class="cv-img">
            </div>
        </section>
    </main>

    <script>
        // Animation du fond réseau
        const canvas = document.getElementById("network-bg");
        const ctx = canvas.getContext("2d");
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.onresize = resize; resize();

        let nodes = [];
        for (let i = 0; i < 70; i++) {
            nodes.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                vx: (Math.random() - 0.5) * 0.6,
                vy: (Math.random() - 0.5) * 0.6
            });
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            nodes.forEach((node, i) => {
                node.x += node.vx; node.y += node.vy;
                if (node.x < 0 || node.x > canvas.width) node.vx *= -1;
                if (node.y < 0 || node.y > canvas.height) node.vy *= -1;
                ctx.beginPath(); ctx.arc(node.x, node.y, 2, 0, Math.PI * 2); ctx.fillStyle = "rgba(56, 189, 248, 0.5)"; ctx.fill();
            });
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
